name: Bug Report
description: Report something that is not working as expected
title: ""
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which part of the app is affected?
      options:
        - Terminal (ghostty-web / PTY)
        - Git Operations (branches / worktrees)
        - Agent Detection / Management
        - UI / Layout (split panes, tabs)
        - Settings / Preferences
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open a workspace with ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: "Found in Superagent > About (e.g. 1.0.0)"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "e.g. 15.4 (Sequoia)"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error output or crash logs. This field is auto-formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
