name: Feature Request
description: Suggest a new feature or improvement
title: ''
labels: ['enhancement']
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - Terminal (ghostty-web / PTY)
        - Git Operations (branches / worktrees)
        - Agent Detection / Management
        - UI / Layout (split panes, tabs)
        - Settings / Preferences
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or what workflow does it improve?
      placeholder: 'I find it frustrating when ...'
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have tried.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or links to related issues.
    validations:
      required: false
