post-checkout:
  commands:
    copy-env:
      run: sh .githooks/copy-env-to-worktree.sh {1} {2} {3}

pre-commit:
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx}'
      run: bunx oxlint {staged_files}
    format:
      glob: '*.{ts,tsx,js,jsx}'
      run: bunx oxfmt --check {staged_files}
    typecheck:
      glob: '*.{ts,tsx}'
      run: bun run --filter desktop typecheck
